<svg viewBox="0 0 960 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="参赛流程:clone → 训练 → 本地自评 → 提交 → 官方评测 → 上榜,看榜改进重新提交" font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif" style="width:100%;height:auto;background:#0b0e14;border-radius:6px">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 Z" fill="#38e1d4"/></marker>
    <marker id="ahd" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 Z" fill="#5d6878"/></marker>
    <style>
      .t{fill:#dfe7f1;font-size:13px;font-weight:700}
      .s{fill:#8a98ac;font-size:10px}
      .c{fill:#8a98ac;font-size:10.5px}
      .node{fill:#10141c;stroke:#1d2530;stroke-width:1.2}
      .key{fill:#0e1a1d;stroke:#1d7d77;stroke-width:1.4}
      .ln{stroke:#38e1d4;stroke-width:1.7;fill:none}
    </style>
  </defs>

  <!-- 反馈环(虚线):看榜改进重新提交 -->
  <path d="M865,66 V36 H95 V62" class="ln" stroke="#5d6878" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ahd)"/>
  <text x="480" y="26" text-anchor="middle" class="c">看榜改进 · 重新提交(T1 → T2 → T3 → T4 顺序解锁,过即锁)</text>

  <!-- ① clone -->
  <rect class="node" x="30" y="66" width="130" height="58" rx="8"/>
  <text x="95" y="100" text-anchor="middle" class="t">clone + 装环境</text>
  <text x="95" y="117" text-anchor="middle" class="s">一键 setup</text>

  <!-- ② 训练 -->
  <rect class="node" x="184" y="66" width="130" height="58" rx="8"/>
  <text x="249" y="100" text-anchor="middle" class="t">训练 ACT</text>
  <text x="249" y="117" text-anchor="middle" class="s">用给定数据 · 单卡</text>

  <!-- ③ 本地自评 -->
  <rect class="node" x="338" y="66" width="130" height="58" rx="8"/>
  <text x="403" y="100" text-anchor="middle" class="t">本地自评</text>
  <text x="403" y="117" text-anchor="middle" class="s">公开种子自测</text>

  <!-- ④ 提交 -->
  <rect class="key" x="492" y="66" width="130" height="58" rx="8"/>
  <text x="557" y="100" text-anchor="middle" class="t">提交</text>
  <text x="557" y="117" text-anchor="middle" class="s">submit.py · 带 token</text>

  <!-- ⑤ 官方评测 -->
  <rect class="node" x="646" y="66" width="130" height="58" rx="8"/>
  <text x="711" y="100" text-anchor="middle" class="t">官方评测</text>
  <text x="711" y="117" text-anchor="middle" class="s">私有种子打分</text>

  <!-- ⑥ 上榜 -->
  <rect class="key" x="800" y="66" width="130" height="58" rx="8"/>
  <text x="865" y="100" text-anchor="middle" class="t" fill="#38e1d4">上榜</text>
  <text x="865" y="117" text-anchor="middle" class="s">匿名榜</text>

  <!-- 箭头 -->
  <line class="ln" x1="162" y1="95" x2="182" y2="95" marker-end="url(#ah)"/>
  <line class="ln" x1="316" y1="95" x2="336" y2="95" marker-end="url(#ah)"/>
  <line class="ln" x1="470" y1="95" x2="490" y2="95" marker-end="url(#ah)"/>
  <line class="ln" x1="624" y1="95" x2="644" y2="95" marker-end="url(#ah)"/>
  <line class="ln" x1="778" y1="95" x2="798" y2="95" marker-end="url(#ah)"/>
</svg>
